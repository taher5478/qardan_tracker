# Build with stable Temurin JDK 17 instead of Android Studio's JBR 21.
org.gradle.java.home=C:/Program Files/Eclipse Adoptium/jdk-17.0.17.10-hotspot

# --- Low-stress profile to survive Intel 13th/14th-gen (i9-14900K) instability ---
# Both JBR 21 and Temurin 17 crashed with random EXCEPTION_ACCESS_VIOLATIONs in
# different subsystems (JIT, GC) under heavy compile load - the signature of the
# Raptor Lake microcode bug. These flags minimise concurrency, JIT, and GC churn
# so the build completes. The real fix is a BIOS microcode update (>= 0x12B).
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+UseSerialGC -XX:TieredStopAtLevel=1 -Djava.net.preferIPv4Stack=true
android.useAndroidX=true
# Serialise build work: far less all-core load, which unstable chips tolerate.
org.gradle.workers.max=2
org.gradle.parallel=false
# Avoid the incremental-compilation cache path that kept appearing at crash time.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
